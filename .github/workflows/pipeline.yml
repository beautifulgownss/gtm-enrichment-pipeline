name: GTM Pipeline

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:       # Also allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directories
        run: |
          mkdir -p data/enriched data/sequences data/signals data/scored_final

      - name: Run full pipeline
        env:
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python src/run_pipeline.py

      - name: Check score changes
        run: python src/diff.py
        continue-on-error: true

      - name: Upload pipeline outputs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs-${{ github.run_id }}
          path: |
            data/enriched/
            data/sequences/
            data/scored_final/
            data/score_diff.json
            data/runs_export.json